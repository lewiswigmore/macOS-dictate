title: "[Idea] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea! Please fill in what you can — be specific about the use case.
  - type: textarea
    id: idea
    attributes:
      label: The idea
      description: What feature, change, or capability would you like to see?
      placeholder: I'd love it if dictate could…
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What problem does this solve for you? How often would you use it?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried other dictation tools or workarounds? What didn't work?
  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would use weekly
        - Would use daily
        - Blocks my workflow
