name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DICTATE_SKIP_MAC_PERMS_TESTS: "1"

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" || pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q

      - name: Security audit (pip-audit)
        run: pip install pip-audit && pip-audit --strict
        continue-on-error: true

      - name: Static security analysis (bandit)
        run: pip install bandit && bandit -r dictate -ll
        continue-on-error: true
