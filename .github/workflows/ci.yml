name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DICTATE_SKIP_MAC_PERMS_TESTS: "1"

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      contents: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          filters: |
            code:
              - 'dictate/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'requirements-*.txt'
              - 'requirements-*.in'
              - '.github/workflows/ci.yml'
              - 'install.sh'

  test:
    name: Python ${{ matrix.python-version }}
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-14
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install 'pip==25.0.1'
          pip install -e ".[dev]" || pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q

      - name: Security audit (pip-audit)
        run: |
          pip install --require-hashes -r requirements-tools.txt
          pip-audit --strict --ignore-vuln GHSA-4xh5-x5gv-qwph || true

      - name: Static security analysis (bandit)
        run: |
          pip install --require-hashes -r requirements-tools.txt
          bandit -r dictate -ll

