<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "History" }} · Dictate</title>
    <link rel="stylesheet" href="/static/app.css">
    <link rel="icon" type="image/svg+xml" href="/static/dictate-mark.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/dictate-mark-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/dictate-touch-180.png">
    <meta name="theme-color" content="#0B0F19" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#F8FAFC" media="(prefers-color-scheme: light)">
  </head>
  {% from "_brand_mark.html" import brand_mark %}
  <body>
    <header class="site-header">
      <a class="brand" href="/" aria-label="Dictate">
        {{ brand_mark(28) }}
        <span class="brand-name">d<span class="brand-name-i">ı</span>ctate</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <div class="nav-links">
          <a href="/" title="Overview, recent activity, and system health">Dashboard</a>
          <a href="/history" title="Browse, search, and export every transcript">History</a>
          <a href="/stats" title="30-day trends, latency, and backend usage">Stats</a>
          <a href="/settings" title="Privacy, backends, and preferences">Settings</a>
        </div>
      </nav>
    </header>
    <main class="container">
      {% block content %}{% endblock %}
    </main>
    {% block scripts %}<script src="/static/app.js"></script>{% endblock %}
  </body>
</html>
