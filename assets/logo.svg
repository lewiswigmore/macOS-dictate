<?xml version="1.0" encoding="UTF-8"?>
<!--
  dictate brand mark — 1024×1024 rounded "squircle" inspired by macOS app icons.
  Composition: a microphone glyph centred over a deep blue→teal gradient,
  with three concentric sound arcs to the left/right of the capsule suggesting
  speech being captured. Designed to read at every size from 16px to 1024px.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#3B82F6"/>
      <stop offset="1"   stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0"    stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- squircle background -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#sheen)"/>

  <!-- mic glyph -->
  <g fill="#FFFFFF" filter="url(#softShadow)">
    <!-- capsule (the mic head) -->
    <rect x="412" y="232" width="200" height="368" rx="100" ry="100"/>
    <!-- guard / U-bracket beneath the capsule -->
    <path d="
      M 312 472
      v 56
      a 200 200 0 0 0 400 0
      v -56
      h -56
      v 56
      a 144 144 0 0 1 -288 0
      v -56
      z" />
    <!-- stem -->
    <rect x="488" y="720" width="48" height="92" rx="12"/>
    <!-- base -->
    <rect x="392" y="792" width="240" height="40" rx="20"/>
  </g>

  <!-- sound arcs (speech being captured) -->
  <g fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-opacity="0.85">
    <path d="M 248 360 q -36 56 0 112" stroke-width="24"/>
    <path d="M 180 312 q -64 104 0 208" stroke-width="20" stroke-opacity="0.55"/>
    <path d="M 776 360 q  36 56 0 112" stroke-width="24"/>
    <path d="M 844 312 q  64 104 0 208" stroke-width="20" stroke-opacity="0.55"/>
  </g>
</svg>
